name: compile

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - uses: open-policy-agent/setup-opa@v2
        with:
          version: "0.70.0"

      - name: Install conftest
        run: |
          CONFTEST_VERSION=0.56.0
          curl -sSfL \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin conftest
          conftest --version

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install project
        run: uv sync

      - name: Compile policies
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run tpcompile build ./policies

      - name: Open PR if rego changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain rego)" ]; then
            echo "No changes under rego/. Nothing to open."
            exit 0
          fi
          branch="compile/$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add rego
          git commit -m "Recompile Rego policies"
          git push --set-upstream origin "$branch"
          gh pr create \
            --title "Recompile Rego policies" \
            --body "Regenerated by the compile workflow. Review the gated artifacts before merging." \
            --base main \
            --head "$branch"
